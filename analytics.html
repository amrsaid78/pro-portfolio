<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%); color: #ffffff; }
        header { background: rgba(26, 31, 46, 0.9); border-bottom: 1px solid rgba(212, 165, 116, 0.2); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 800; color: #d4a574; }
        .nav { display: flex; gap: 20px; }
        .nav-link { padding: 10px 15px; background: transparent; border: none; color: #b0b0b0; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: 600; transition: all 0.3s; text-decoration: none; }
        .nav-link:hover, .nav-link.active { color: #d4a574; border-bottom: 2px solid #d4a574; }
        .user-info { text-align: right; }
        .user-name { font-weight: 600; font-size: 14px; }
        .user-email { font-size: 12px; color: #b0b0b0; }
        .logout-btn { padding: 8px 16px; background: rgba(255, 107, 107, 0.2); border: 1px solid #ff6b6b; color: #ff9999; border-radius: 6px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: 600; }
        .logout-btn:hover { background: rgba(255, 107, 107, 0.3); }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px; }
        .title { font-size: 28px; font-weight: 800; margin-bottom: 30px; }
        .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .chart-card { background: rgba(26, 31, 46, 0.8); border: 1px solid rgba(212, 165, 116, 0.2); border-radius: 12px; padding: 24px; }
        .chart-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
        .chart-container { position: relative; height: 400px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: rgba(26, 31, 46, 0.8); border: 1px solid rgba(212, 165, 116, 0.2); border-radius: 12px; padding: 24px; text-align: center; }
        .stat-label { color: #b0b0b0; font-size: 12px; margin-bottom: 10px; text-transform: uppercase; }
        .stat-value { font-size: 24px; font-weight: 800; color: #d4a574; }
        .stat-change { font-size: 12px; color: #7dd87d; margin-top: 8px; }
        @media (max-width: 768px) {
            .analytics-grid { grid-template-columns: 1fr; }
            header { flex-direction: column; gap: 15px; }
            .container { padding: 20px; }
            .nav { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">PRO PORTFOLIO</div>
        <nav class="nav">
            <a href="dashboard.html">لوحة التحكم</a>
            <a href="stocks.html">الأسهم</a>
            <a href="analytics.html" class="active">التحليلات</a>
            <a href="import-export.html">الاستيراد/التصدير</a>
            <a href="settings.html">الإعدادات</a>
        </nav>
        <div style="display: flex; gap: 20px; align-items: center;">
            <div class="user-info">
                <div class="user-name" id="userName">المستخدم</div>
                <div class="user-email" id="userEmail"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="f0959d91999cb09588919d809c95de939f9d">[email&#160;protected]</a></div>
            </div>
            <button class="logout-btn" id="logoutBtn">خروج</button>
        </div>
    </header>

    <div class="container">
        <h1 class="title">التحليلات المتقدمة</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">أفضل قطاع</div>
                <div class="stat-value" id="bestSector">-</div>
                <div class="stat-change" id="bestSectorPct">+0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">أسوأ قطاع</div>
                <div class="stat-value" id="worstSector">-</div>
                <div class="stat-change" id="worstSectorPct" style="color: #ff6b6b;">-0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">متوسط الأداء</div>
                <div class="stat-value" id="avgPerformance">0%</div>
                <div class="stat-change">للمحفظة</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">أفضل سهم</div>
                <div class="stat-value" id="bestStock">-</div>
                <div class="stat-change" id="bestStockPct">+0%</div>
            </div>
        </div>

        <div class="analytics-grid">
            <div class="chart-card">
                <div class="chart-title">توزيع الأسهم حسب القطاع</div>
                <div class="chart-container"><canvas id="sectorDistributionChart"></canvas></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">أداء القطاعات</div>
                <div class="chart-container"><canvas id="sectorPerformanceChart"></canvas></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">أفضل 5 أسهم</div>
                <div class="chart-container"><canvas id="topStocksChart"></canvas></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">توزيع الأرباح</div>
                <div class="chart-container"><canvas id="profitDistributionChart"></canvas></div>
            </div>
        </div>
    </div>

    <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const config = {
            apiKey: "AIzaSyAsL7bSa9ztYVype-TrVN1RG921L668uUQ",
            authDomain: "pro-portfolio-71679.firebaseapp.com",
            databaseURL: "https://pro-portfolio-71679-default-rtdb.firebaseio.com",
            projectId: "pro-portfolio-71679",
            storageBucket: "pro-portfolio-71679.firebasestorage.app",
            messagingSenderId: "238356081205",
            appId: "1:238356081205:web:1a88fb9eff5661a1b75f7c"
        };

        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let stocks = [];
        let charts = {};
        let currentUserId = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUserId = user.uid;
            document.getElementById('userEmail').textContent = user.email;

            const userRef = ref(db, 'users/' + user.uid);
            const snap = await get(userRef);
            if (snap.exists()) {
                document.getElementById('userName').textContent = snap.val().name;
            }

            loadStocks();
        });

        function loadStocks() {
            onValue(ref(db, 'stocks/' + currentUserId), (snap) => {
                stocks = [];
                if (snap.exists()) {
                    Object.entries(snap.val()).forEach(([key, val]) => {
                        stocks.push({ ...val, id: key });
                    });
                }
                render();
            });
        }

        function render() {
            updateStats();
            initCharts();
        }

        function updateStats() {
            if (stocks.length === 0) return;

            // أفضل قطاع
            const sectorAnalysis = {};
            stocks.forEach(s => {
                if (!sectorAnalysis[s.category]) {
                    sectorAnalysis[s.category] = { profit: 0, invest: 0 };
                }
                const invest = s.purchasePrice * s.quantity;
                const curr = s.currentPrice * s.quantity;
                sectorAnalysis[s.category].profit += curr - invest;
                sectorAnalysis[s.category].invest += invest;
            });

            let bestSector = '', bestSectorPct = -Infinity;
            let worstSector = '', worstSectorPct = Infinity;

            Object.entries(sectorAnalysis).forEach(([sector, data]) => {
                const pct = data.invest > 0 ? (data.profit / data.invest * 100) : 0;
                if (pct > bestSectorPct) {
                    bestSectorPct = pct;
                    bestSector = sector;
                }
                if (pct < worstSectorPct) {
                    worstSectorPct = pct;
                    worstSector = sector;
                }
            });

            document.getElementById('bestSector').textContent = bestSector || '-';
            document.getElementById('bestSectorPct').textContent = (bestSectorPct >= 0 ? '+' : '') + bestSectorPct.toFixed(2) + '%';
            document.getElementById('worstSector').textContent = worstSector || '-';
            document.getElementById('worstSectorPct').textContent = (worstSectorPct >= 0 ? '+' : '') + worstSectorPct.toFixed(2) + '%';

            // متوسط الأداء
            let totalProfit = 0, totalInvest = 0;
            stocks.forEach(s => {
                const invest = s.purchasePrice * s.quantity;
                const curr = s.currentPrice * s.quantity;
                totalProfit += curr - invest;
                totalInvest += invest;
            });
            const avgPct = totalInvest > 0 ? (totalProfit / totalInvest * 100).toFixed(2) : 0;
            document.getElementById('avgPerformance').textContent = (avgPct >= 0 ? '+' : '') + avgPct + '%';

            // أفضل سهم
            let bestStock = '', bestStockPct = -Infinity;
            stocks.forEach(s => {
                const pct = ((s.currentPrice - s.purchasePrice) / s.purchasePrice * 100);
                if (pct > bestStockPct) {
                    bestStockPct = pct;
                    bestStock = s.name;
                }
            });
            document.getElementById('bestStock').textContent = bestStock || '-';
            document.getElementById('bestStockPct').textContent = (bestStockPct >= 0 ? '+' : '') + bestStockPct.toFixed(2) + '%';
        }

        function initCharts() {
            if (stocks.length === 0) return;

            // 1. توزيع الأسهم حسب القطاع
            const sectorCount = {};
            stocks.forEach(s => {
                sectorCount[s.category] = (sectorCount[s.category] || 0) + 1;
            });

            const ctx1 = document.getElementById('sectorDistributionChart').getContext('2d');
            charts.sectorDist = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(sectorCount),
                    datasets: [{
                        data: Object.values(sectorCount),
                        backgroundColor: ['#d4a574', '#e8c4a0', '#c89968', '#e0b89c', '#d9a17a', '#e5b896', '#c99070', '#e2b08a'],
                        borderColor: '#1a1f2e'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#b0b0b0' } } } }
            });

            // 2. أداء القطاعات
            const sectorPerf = {};
            stocks.forEach(s => {
                if (!sectorPerf[s.category]) sectorPerf[s.category] = { profit: 0, invest: 0 };
                const invest = s.purchasePrice * s.quantity;
                const curr = s.currentPrice * s.quantity;
                sectorPerf[s.category].profit += curr - invest;
                sectorPerf[s.category].invest += invest;
            });

            const sectorPcts = Object.entries(sectorPerf).map(([_, data]) => 
                data.invest > 0 ? (data.profit / data.invest * 100).toFixed(2) : 0
            );

            const ctx2 = document.getElementById('sectorPerformanceChart').getContext('2d');
            charts.sectorPerf = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: Object.keys(sectorPerf),
                    datasets: [{
                        label: 'النسبة %',
                        data: sectorPcts,
                        backgroundColor: sectorPcts.map(p => p >= 0 ? '#4caf50' : '#ff6b6b')
                    }]
                },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: 'rgba(212, 165, 116, 0.1)' }, ticks: { color: '#b0b0b0' } }, y: { grid: { display: false }, ticks: { color: '#b0b0b0' } } } }
            });

            // 3. أفضل 5 أسهم
            const sortedStocks = [...stocks].sort((a, b) => {
                const pctA = (b.currentPrice - b.purchasePrice) / b.purchasePrice * 100;
                const pctB = (a.currentPrice - a.purchasePrice) / a.purchasePrice * 100;
                return pctA - pctB;
            }).slice(0, 5);

            const topPcts = sortedStocks.map(s => ((s.currentPrice - s.purchasePrice) / s.purchasePrice * 100).toFixed(2));

            const ctx3 = document.getElementById('topStocksChart').getContext('2d');
            charts.topStocks = new Chart(ctx3, {
                type: 'bar',
                data: {
                    labels: sortedStocks.map(s => s.name),
                    datasets: [{
                        label: '%',
                        data: topPcts,
                        backgroundColor: '#4caf50'
                    }]
                },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: 'rgba(212, 165, 116, 0.1)' }, ticks: { color: '#b0b0b0' } }, y: { grid: { display: false }, ticks: { color: '#b0b0b0' } } } }
            });

            // 4. توزيع الأرباح
            const profits = stocks.map(s => (s.currentPrice - s.purchasePrice) * s.quantity);

            const ctx4 = document.getElementById('profitDistributionChart').getContext('2d');
            charts.profitDist = new Chart(ctx4, {
                type: 'doughnut',
                data: {
                    labels: stocks.map(s => s.name),
                    datasets: [{
                        data: profits,
                        backgroundColor: profits.map(p => p >= 0 ? '#4caf50' : '#ff6b6b'),
                        borderColor: '#1a1f2e'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#b0b0b0' } } } }
