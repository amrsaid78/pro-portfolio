<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Portfolio - الأسهم</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .controls { background: rgba(26, 31, 46, 0.8); border: 1px solid rgba(212, 165, 116, 0.2); border-radius: 12px; padding: 24px; margin-bottom: 30px; display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 15px; align-items: flex-end; }
        .search-container { position: relative; }
        .search-dropdown { position: absolute; top: 100%; right: 0; background: rgba(26, 31, 46, 0.95); border: 1px solid rgba(212, 165, 116, 0.2); border-radius: 6px; max-height: 200px; overflow-y: auto; width: 100%; z-index: 100; display: none; }
        .search-dropdown.show { display: block; }
        .dropdown-item { padding: 10px; cursor: pointer; transition: all 0.2s; border-bottom: 1px solid rgba(212, 165, 116, 0.1); }
        .dropdown-item:hover { background: rgba(212, 165, 116, 0.1); }
        .table-card { background: rgba(26, 31, 46, 0.8); border: 1px solid rgba(212, 165, 116, 0.2); border-radius: 12px; padding: 24px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px; text-align: right; font-weight: 700; color: var(--text-secondary); font-size: 11px; border-bottom: 1px solid rgba(212, 165, 116, 0.2); text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid rgba(212, 165, 116, 0.1); font-size: 13px; }
        .action-menu { position: relative; }
        .menu-btn { padding: 6px 12px; background: rgba(212, 165, 116, 0.2); border: 1px solid #d4a574; color: #d4a574; border-radius: 4px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: 600; }
        .menu-btn:hover { background: #d4a574; color: #0f1419; }
        .dropdown-menu { display: none; position: absolute; top: 100%; left: 0; background: rgba(26, 31, 46, 0.95); border: 1px solid rgba(212, 165, 116, 0.2); border-radius: 6px; min-width: 150px; z-index: 100; }
        .dropdown-menu.show { display: block; }
        .dropdown-menu a { display: block; padding: 10px 15px; color: #d4a574; text-decoration: none; border-bottom: 1px solid rgba(212, 165, 116, 0.1); cursor: pointer; font-size: 12px; }
        .dropdown-menu a:hover { background: rgba(212, 165, 116, 0.1); }
        .dropdown-menu a.delete { color: #ff6b6b; }
        .category-section { background: rgba(26, 31, 46, 0.8); border: 1px solid rgba(212, 165, 116, 0.2); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .category-title { font-size: 18px; font-weight: 700; color: var(--accent-gold); margin-bottom: 15px; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); align-items: center; justify-content: center; z-index: 1000; overflow-y: auto; padding: 20px; }
        .modal.show { display: flex; }
        .modal-content { background: var(--secondary-dark); border: 1px solid rgba(212, 165, 116, 0.2); border-radius: 12px; padding: 40px; max-width: 650px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .modal-title { font-size: 24px; font-weight: 800; margin-bottom: 20px; }
        .section-title { font-size: 16px; font-weight: 700; color: var(--accent-gold); margin-top: 25px; margin-bottom: 15px; border-bottom: 1px solid rgba(212, 165, 116, 0.2); padding-bottom: 10px; }
        .form-group { margin-bottom: 12px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        input, select { width: 100%; padding: 10px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(212, 165, 116, 0.2); border-radius: 6px; color: #ffffff; font-family: 'Tajawal', sans-serif; font-size: 13px; }
        input:focus, select:focus { outline: none; border-color: var(--accent-gold); }
        .modal-buttons { display: flex; gap: 10px; margin-top: 25px; }
        .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: 700; transition: all 0.3s; }
        .modal-btn.primary { background: linear-gradient(135deg, #d4a574 0%, #e8c4a0 100%); color: #0f1419; }
        .modal-btn.primary:hover { opacity: 0.9; }
        .modal-btn.secondary { background: rgba(0, 0, 0, 0.3); color: #ffffff; border: 1px solid rgba(212, 165, 116, 0.2); }
        .modal-btn.secondary:hover { background: rgba(0, 0, 0, 0.4); }
        .close { font-size: 28px; cursor: pointer; position: absolute; right: 20px; top: 20px; color: var(--text-secondary); border: none; background: none; }
        .empty-message { text-align: center; padding: 40px; color: var(--text-secondary); }
        .view-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .view-btn { padding: 10px 20px; background: rgba(212, 165, 116, 0.2); border: 1px solid #d4a574; color: #d4a574; border-radius: 6px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: 600; }
        .view-btn.active { background: linear-gradient(135deg, #d4a574 0%, #e8c4a0 100%); color: #0f1419; }
        @media (max-width: 768px) { .controls { grid-template-columns: 1fr 1fr; } .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <div class="logo">PRO PORTFOLIO</div>
        <nav class="nav">
            <a href="dashboard.html">لوحة التحكم</a>
            <a href="stocks.html" class="active">الأسهم</a>
            <a href="analytics.html">التحليلات</a>
            <a href="import-export.html">الاستيراد/التصدير</a>
            <a href="settings.html">الإعدادات</a>
        </nav>
        <div class="user-section">
            <div class="user-info">
                <div class="user-name" id="userName">-</div>
                <div class="user-email" id="userEmail">-</div>
            </div>
            <button class="logout-btn" id="logoutBtn">خروج</button>
        </div>
    </header>

    <div class="container">
        <h1 class="title">إدارة الأسهم</h1>

        <div class="controls">
            <div class="search-container">
                <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600; color: var(--text-secondary);">البحث</label>
                <input type="text" id="searchInput" placeholder="ابحث بـ الاسم...">
                <div id="searchDropdown" class="search-dropdown"></div>
            </div>
            <div>
                <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600; color: var(--text-secondary);">القطاع</label>
                <select id="filterCategory">
                    <option value="">كل القطاعات</option>
                    <option value="قطاع مالي">قطاع مالي</option>
                    <option value="قطاع عقاري">قطاع عقاري</option>
                    <option value="قطاع صحي">قطاع صحي</option>
                    <option value="الاتصالات">الاتصالات</option>
                    <option value="تكنولوجيا المعلومات">تكنولوجيا المعلومات</option>
                    <option value="الأغذية والمشروبات">الأغذية والمشروبات</option>
                    <option value="الأسمدة والكيماويات">الأسمدة والكيماويات</option>
                    <option value="مواد أساسية">مواد أساسية</option>
                    <option value="الطاقة">الطاقة</option>
                    <option value="التأمين">التأمين</option>
                    <option value="أخرى">أخرى</option>
                </select>
            </div>
            <button class="btn btn-primary" id="addBtn">+ إضافة</button>
            <button class="btn btn-secondary" id="viewToggleBtn" onclick="toggleView()">عرض حسب القطاع</button>
        </div>

        <!-- List View -->
        <div id="listView" class="table-card" style="display: block;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>السهم</th>
                        <th>الرمز</th>
                        <th>القطاع</th>
                        <th>متوسط السعر</th>
                        <th>الكمية</th>
                        <th>السعر الحالي</th>
                        <th>القيمة العادلة</th>
                        <th>الأرباح</th>
                        <th>النسبة %</th>
                        <th>الإجراء</th>
                    </tr>
                </thead>
                <tbody id="stocksBody">
                    <tr><td colspan="11" class="empty-message">لا توجد أسهم</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Category View -->
        <div id="categoryView" style="display: none;">
            <div id="categoryContainer"></div>
        </div>
    </div>

    <!-- Stock Modal -->
    <div class="modal" id="stockModal">
        <div class="modal-content">
            <button class="close" onclick="closeStockModal()">&times;</button>
            <h2 class="modal-title">إضافة/تعديل سهم</h2>
            <form id="stockForm" onsubmit="submitStockForm(event)">
                <!-- البيانات الأساسية -->
                <div class="section-title">البيانات الأساسية</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>اسم السهم</label>
                        <input type="text" id="stockName" required>
                    </div>
                    <div class="form-group">
                        <label>الرمز (Symbol)</label>
                        <input type="text" id="stockSymbol" placeholder="مثال: ADAWEE" maxlength="10">
                    </div>
                </div>

                <div class="form-group">
                    <label>القطاع</label>
                    <select id="category" required>
                        <option value="">اختر قطاع</option>
                        <option value="قطاع مالي">قطاع مالي</option>
                        <option value="قطاع عقاري">قطاع عقاري</option>
                        <option value="قطاع صحي">قطاع صحي</option>
                        <option value="الاتصالات">الاتصالات</option>
                        <option value="تكنولوجيا المعلومات">تكنولوجيا المعلومات</option>
                        <option value="الأغذية والمشروبات">الأغذية والمشروبات</option>
                        <option value="الأسمدة والكيماويات">الأسمدة والكيماويات</option>
                        <option value="مواد أساسية">مواد أساسية</option>
                        <option value="الطاقة">الطاقة</option>
                        <option value="التأمين">التأمين</option>
                        <option value="أخرى">أخرى</option>
                    </select>
                </div>

                <!-- الشراء الأول (الأهم) -->
                <div class="section-title">الشراء الأول</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>تاريخ الشراء</label>
                        <input type="date" id="firstPurchaseDate" required>
                    </div>
                    <div class="form-group">
                        <label>سعر الشراء (ج.م)</label>
                        <input type="number" id="firstPurchasePrice" step="0.01" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>الكمية (عدد الأسهم)</label>
                    <input type="number" id="firstQuantity" min="1" required>
                </div>

                <!-- النسب المالية -->
                <div class="section-title">النسب المالية</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>P/E (المضاعفة)</label>
                        <input type="number" id="pe" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>EPS (الربحية)</label>
                        <input type="number" id="eps" step="0.01">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>ROE (العائد على الملكية %)</label>
                        <input type="number" id="roe" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>ROA (العائد على الأصول %)</label>
                        <input type="number" id="roa" step="0.01">
                    </div>
                </div>

                <!-- القيمة العادلة -->
                <div class="section-title">القيمة العادلة</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>الطريقة</label>
                        <select id="fairValueMethod" onchange="calculateFairValue()">
                            <option value="pe">P/E Method</option>
                            <option value="book">Book Value</option>
                            <option value="manual">دخول يدوي</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>القيمة العادلة (ج.م)</label>
                        <input type="number" id="fairValue" step="0.01">
                    </div>
                </div>

                <!-- السعر الحالي -->
                <div class="section-title">السعر الحالي</div>
                <div class="form-group">
                    <label>السعر الحالي (ج.م)</label>
                    <input type="number" id="currentPrice" step="0.01" required>
                </div>

                <!-- ملاحظات -->
                <div class="section-title">ملاحظات</div>
                <div class="form-group">
                    <label>ملاحظات</label>
                    <input type="text" id="notes" placeholder="ملاحظاتك (اختياري)">
                </div>

                <div class="modal-buttons">
                    <button type="button" class="modal-btn secondary" onclick="closeStockModal()">إلغاء</button>
                    <button type="submit" class="modal-btn primary">حفظ السهم</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getDatabase, ref, get, set, push, remove, update, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const config = {
            apiKey: "AIzaSyAsL7bSa9ztYVype-TrVN1RG921L668uUQ",
            authDomain: "pro-portfolio-71679.firebaseapp.com",
            databaseURL: "https://pro-portfolio-71679-default-rtdb.firebaseio.com",
            projectId: "pro-portfolio-71679",
            storageBucket: "pro-portfolio-71679.firebasestorage.app",
            messagingSenderId: "238356081205",
            appId: "1:238356081205:web:1a88fb9eff5661a1b75f7c"
        };

        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let allStocks = [];
        let displayedStocks = [];
        let currentUser = null;
        let editingStockId = null;
        let currentView = 'list'; // list أو category

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            document.getElementById('userEmail').textContent = user.email;

            try {
                const userRef = ref(db, 'users/' + user.uid);
                const snap = await get(userRef);
                if (snap.exists()) {
                    document.getElementById('userName').textContent = snap.val().name;
                }
            } catch (error) {
                console.error('Error:', error);
            }

            loadStocks();
        });

        function loadStocks() {
            onValue(ref(db, 'stocks/' + currentUser.uid), (snap) => {
                allStocks = [];
                if (snap.exists()) {
                    Object.entries(snap.val()).forEach(([key, val]) => {
                        allStocks.push({ ...val, id: key });
                    });
                }
                displayedStocks = [...allStocks];
                render();
                updateSearchDropdown();
            });
        }

        function render() {
            if (currentView === 'list') {
                renderTable();
            } else {
                renderCategoryView();
            }
        }

        function renderTable() {
            const tbody = document.getElementById('stocksBody');

            if (displayedStocks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" class="empty-message">لا توجد أسهم</td></tr>';
                return;
            }

            tbody.innerHTML = displayedStocks.map((s, i) => {
                const avgPrice = calculateAveragePrice(s);
                const currQuantity = calculateCurrentQuantity(s);
                const invest = avgPrice * currQuantity;
                const curr = s.currentPrice * currQuantity;
                const profit = curr - invest;
                const pct = invest > 0 ? ((curr - invest) / invest * 100).toFixed(2) : 0;
                const fairValue = s.fairValue ? s.fairValue.toFixed(2) : '-';

                return `<tr>
                    <td>${i + 1}</td>
                    <td><strong>${s.name}</strong></td>
                    <td>${s.symbol || '-'}</td>
                    <td>${s.category}</td>
                    <td>${avgPrice.toFixed(2)}</td>
                    <td>${currQuantity}</td>
                    <td>${s.currentPrice}</td>
                    <td>${fairValue}</td>
                    <td style="color: ${profit >= 0 ? '#7dd87d' : '#ff6b6b'}">${profit.toFixed(2)}</td>
                    <td style="color: ${profit >= 0 ? '#7dd87d' : '#ff6b6b'}; font-weight: 600;">${pct}%</td>
                    <td>
                        <div class="action-menu">
                            <button class="menu-btn" onclick="toggleMenu(event)">⋮</button>
                            <div class="dropdown-menu">
                                <a onclick="editStock('${s.id}')">✏️ تعديل</a>
                                <a onclick="viewPurchases('${s.id}')">📦 الدفعات</a>
                                <a onclick="viewDividends('${s.id}')">💰 التوزيعات</a>
                                <a class="delete" onclick="deleteStock('${s.id}')">🗑️ حذف</a>
                            </div>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        function renderCategoryView() {
            const container = document.getElementById('categoryContainer');
            const categories = {};

            displayedStocks.forEach(stock => {
                if (!categories[stock.category]) {
                    categories[stock.category] = [];
                }
                categories[stock.category].push(stock);
            });

            if (Object.keys(categories).length === 0) {
                container.innerHTML = '<div class="empty-message">لا توجد أسهم</div>';
                return;
            }

            container.innerHTML = Object.entries(categories).map(([category, stocks]) => {
                const categoryTotal = stocks.reduce((sum, s) => {
                    const avgPrice = calculateAveragePrice(s);
                    const currQuantity = calculateCurrentQuantity(s);
                    return sum + (avgPrice * currQuantity);
                }, 0);

                const categoryCurrentValue = stocks.reduce((sum, s) => {
                    const currQuantity = calculateCurrentQuantity(s);
                    return sum + (s.currentPrice * currQuantity);
                }, 0);

                const categoryProfit = categoryCurrentValue - categoryTotal;
                const categoryPct = categoryTotal > 0 ? ((categoryCurrentValue - categoryTotal) / categoryTotal * 100).toFixed(2) : 0;

                return `
                    <div class="category-section">
                        <div class="category-title">${category}</div>
                        <table style="width: 100%; font-size: 13px;">
                            <thead>
                                <tr>
                                    <th style="text-align: right;">السهم</th>
                                    <th>متوسط السعر</th>
                                    <th>الكمية</th>
                                    <th>السعر الحالي</th>
                                    <th>الأرباح</th>
                                    <th>النسبة %</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${stocks.map(s => {
                                    const avgPrice = calculateAveragePrice(s);
                                    const currQuantity = calculateCurrentQuantity(s);
                                    const invest = avgPrice * currQuantity;
                                    const curr = s.currentPrice * currQuantity;
                                    const profit = curr - invest;
                                    const pct = invest > 0 ? ((curr - invest) / invest * 100).toFixed(2) : 0;
                                    return `<tr>
                                        <td><strong>${s.name}</strong></td>
                                        <td>${avgPrice.toFixed(2)}</td>
                                        <td>${currQuantity}</td>
                                        <td>${s.currentPrice}</td>
                                        <td style="color: ${profit >= 0 ? '#7dd87d' : '#ff6b6b'}">${profit.toFixed(2)}</td>
                                        <td style="color: ${profit >= 0 ? '#7dd87d' : '#ff6b6b'}; font-weight: 600;">${pct}%</td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                        <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(212, 165, 116, 0.2); font-weight: 600; font-size: 13px;">
                            <div>الإجمالي المستثمر: ${categoryTotal.toFixed(2)} ج.م</div>
                            <div>القيمة الحالية: ${categoryCurrentValue.toFixed(2)} ج.م</div>
                            <div>الأرباح: <span style="color: ${categoryProfit >= 0 ? '#7dd87d' : '#ff6b6b'}">${categoryProfit.toFixed(2)} ج.م (${categoryPct}%)</span></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function calculateAveragePrice(stock) {
            if (!stock.purchases || stock.purchases.length === 0) {
                return parseFloat(stock.firstPurchasePrice) || 0;
            }
            const totalCost = stock.purchases.reduce((sum, p) => sum + (p.pricePerShare * p.quantity), 0);
            const totalQuantity = stock.purchases.reduce((sum, p) => sum + p.quantity, 0);
            return totalQuantity > 0 ? totalCost / totalQuantity : 0;
        }

        function calculateCurrentQuantity(stock) {
            if (!stock.purchases || stock.purchases.length === 0) {
                return parseInt(stock.firstQuantity) || 0;
            }
            return stock.purchases.reduce((sum, p) => sum + p.quantity, 0);
        }

        function updateSearchDropdown() {
            const dropdown = document.getElementById('searchDropdown');
            const uniqueNames = [...new Set(allStocks.map(s => s.name))];
            dropdown.innerHTML = uniqueNames.map(name => 
                `<div class="dropdown-item" onclick="selectFromDropdown('${name}')">${name}</div>`
            ).join('');
        }

        window.selectFromDropdown = function(name) {
            document.getElementById('searchInput').value = name;
            document.getElementById('searchDropdown').classList.remove('show');
            filterStocks();
        };

        document.getElementById('searchInput').addEventListener('focus', () => {
            document.getElementById('searchDropdown').classList.add('show');
        });

        document.getElementById('searchInput').addEventListener('blur', () => {
            setTimeout(() => {
                document.getElementById('searchDropdown').classList.remove('show');
            }, 200);
        });

        document.getElementById('searchInput').addEventListener('input', filterStocks);
        document.getElementById('filterCategory').addEventListener('change', filterStocks);

        function filterStocks() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('filterCategory').value;

            displayedStocks = allStocks.filter(s => {
                const matchSearch = s.name.toLowerCase().includes(search) || (s.symbol && s.symbol.toLowerCase().includes(search));
                const matchCategory = !category || s.category === category;
                return matchSearch && matchCategory;
            });

            render();
        }

        window.toggleMenu = function(event) {
            event.stopPropagation();
            const menu = event.target.nextElementSibling;
            document.querySelectorAll('.dropdown-menu').forEach(m => {
                if (m !== menu) m.classList.remove('show');
            });
            menu.classList.toggle('show');
        };

        document.addEventListener('click', () => {
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
        });

        window.submitStockForm = async function(e) {
            e.preventDefault();

            const stock = {
                name: document.getElementById('stockName').value.toUpperCase(),
                symbol: document.getElementById('stockSymbol').value.toUpperCase(),
                category: document.getElementById('category').value,
                currentPrice: parseFloat(document.getElementById('currentPrice').value),
                pe: parseFloat(document.getElementById('pe').value) || null,
                eps: parseFloat(document.getElementById('eps').value) || null,
                roe: parseFloat(document.getElementById('roe').value) || null,
                roa: parseFloat(document.getElementById('roa').value) || null,
                fairValue: parseFloat(document.getElementById('fairValue').value) || null,
                fairValueMethod: document.getElementById('fairValueMethod').value,
                notes: document.getElementById('notes').value || '',
                firstPurchaseDate: document.getElementById('firstPurchaseDate').value,
                firstPurchasePrice: parseFloat(document.getElementById('firstPurchasePrice').value),
                firstQuantity: parseInt(document.getElementById('firstQuantity').value),
                date: new Date().toISOString()
            };

            // إذا كان التعديل، نحتفظ بالدفعات والتوزيعات القديمة
            if (editingStockId) {
                const existingStock = allStocks.find(s => s.id === editingStockId);
                stock.purchases = existingStock.purchases || [];
                stock.dividends = existingStock.dividends || [];
                
                // إذا تغيرت الدفعة الأولى، نحدّثها
                if (stock.purchases.length > 0) {
                    stock.purchases[0] = {
                        id: 'purchase_1',
                        date: stock.firstPurchaseDate,
                        quantity: stock.firstQuantity,
                        pricePerShare: stock.firstPurchasePrice,
                        total: stock.firstQuantity * stock.firstPurchasePrice
                    };
                }

                await set(ref(db, 'stocks/' + currentUser.uid + '/' + editingStockId), stock);
            } else {
                stock.purchases = [{
                    id: 'purchase_1',
                    date: stock.firstPurchaseDate,
                    quantity: stock.firstQuantity,
                    pricePerShare: stock.firstPurchasePrice,
                    total: stock.firstQuantity * stock.firstPurchasePrice
                }];
                stock.dividends = [];
                await push(ref(db, 'stocks/' + currentUser.uid), stock);
            }

            closeStockModal();
            document.getElementById('stockForm').reset();
            editingStockId = null;
        };

        window.editStock = function(id) {
            const stock = allStocks.find(s => s.id === id);
            if (!stock) return;

            editingStockId = id;
            document.getElementById('stockName').value = stock.name;
            document.getElementById('stockSymbol').value = stock.symbol || '';
            document.getElementById('category').value = stock.category;
            document.getElementById('currentPrice').value = stock.currentPrice;
            document.getElementById('pe').value = stock.pe || '';
            document.getElementById('eps').value = stock.eps || '';
            document.getElementById('roe').value = stock.roe || '';
            document.getElementById('roa').value = stock.roa || '';
            document.getElementById('fairValue').value = stock.fairValue || '';
            document.getElementById('fairValueMethod').value = stock.fairValueMethod || 'pe';
            document.getElementById('notes').value = stock.notes || '';
            document.getElementById('firstPurchaseDate').value = stock.firstPurchaseDate || '';
            document.getElementById('firstPurchasePrice').value = stock.firstPurchasePrice || '';
            document.getElementById('firstQuantity').value = stock.firstQuantity || '';

            document.getElementById('stockModal').classList.add('show');
        };

        window.deleteStock = async function(id) {
            if (confirm('هل أنت متأكد من حذف هذا السهم؟')) {
                try {
                    await remove(ref(db, 'stocks/' + currentUser.uid + '/' + id));
                } catch (error) {
                    alert('خطأ: ' + error.message);
                }
            }
        };

        window.viewPurchases = function(id) {
            const stock = allStocks.find(s => s.id === id);
            alert(`الدفعات الخاصة بـ ${stock.name}:\n\nسيتم إضافة هذه الميزة قريباً`);
        };

        window.viewDividends = function(id) {
            const stock = allStocks.find(s => s.id === id);
            alert(`التوزيعات الخاصة بـ ${stock.name}:\n\nسيتم إضافة هذه الميزة قريباً`);
        };

        window.closeStockModal = function() {
            document.getElementById('stockModal').classList.remove('show');
            editingStockId = null;
        };

        window.toggleView = function() {
            currentView = currentView === 'list' ? 'category' : 'list';
            document.getElementById('listView').style.display = currentView === 'list' ? 'block' : 'none';
            document.getElementById('categoryView').style.display = currentView === 'category' ? 'block' : 'none';
            
            const btn = document.getElementById('viewToggleBtn');
            btn.textContent = currentView === 'list' ? 'عرض حسب القطاع' : 'عرض القائمة';
            btn.classList.toggle('btn-primary');
            btn.classList.toggle('btn-secondary');
            
            render();
        };

        window.calculateFairValue = function() {
            const method = document.getElementById('fairValueMethod').value;
            const eps = parseFloat(document.getElementById('eps').value) || 0;
            const pe = parseFloat(document.getElementById('pe').value) || 0;
            let fairValue = 0;

            if (method === 'pe' && eps > 0 && pe > 0) {
                fairValue = eps * pe;
                document.getElementById('fairValue').value = fairValue.toFixed(2);
            }
        };

        document.getElementById('eps').addEventListener('change', window.calculateFairValue);
        document.getElementById('pe').addEventListener('change', window.calculateFairValue);

        document.getElementById('addBtn').addEventListener('click', () => {
            document.getElementById('stockForm').reset();
            editingStockId = null;
            document.getElementById('stockModal').classList.add('show');
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await signOut(auth);
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Logout error:', error);
            }
        });
    </script>
</body>
</html>
