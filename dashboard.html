<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Portfolio - لوحة التحكم</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%); color: #ffffff; }
        header { background: rgba(26, 31, 46, 0.9); border-bottom: 1px solid rgba(212, 165, 116, 0.2); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .logo { font-size: 24px; font-weight: 800; color: #d4a574; }
        .nav { display: flex; gap: 20px; flex-wrap: wrap; }
        .nav a { padding: 10px 15px; background: transparent; border: none; color: #b0b0b0; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: 600; text-decoration: none; transition: all 0.3s; }
        .nav a:hover, .nav a.active { color: #d4a574; border-bottom: 2px solid #d4a574; }
        .user-section { display: flex; gap: 20px; align-items: center; }
        .user-info { text-align: right; }
        .user-name { font-weight: 600; font-size: 14px; }
        .user-email { font-size: 12px; color: #b0b0b0; }
        .logout-btn { padding: 8px 16px; background: rgba(255, 107, 107, 0.2); border: 1px solid #ff6b6b; color: #ff9999; border-radius: 6px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: 600; transition: all 0.3s; }
        .logout-btn:hover { background: rgba(255, 107, 107, 0.3); }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px; }
        .title { font-size: 28px; font-weight: 800; margin-bottom: 30px; }
        .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .kpi { background: rgba(26, 31, 46, 0.8); border: 1px solid rgba(212, 165, 116, 0.2); border-radius: 12px; padding: 24px; }
        .kpi-label { color: #b0b0b0; font-size: 12px; margin-bottom: 10px; text-transform: uppercase; }
        .kpi-value { font-size: 28px; font-weight: 800; color: #d4a574; margin-bottom: 5px; }
        .kpi-change { font-size: 13px; color: #7dd87d; }
        .charts { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 40px; }
        .chart-card { background: rgba(26, 31, 46, 0.8); border: 1px solid rgba(212, 165, 116, 0.2); border-radius: 12px; padding: 24px; }
        .chart-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
        .chart-container { position: relative; height: 300px; }
        .message { padding: 15px; border-radius: 6px; margin-bottom: 20px; display: none; }
        .message.show { display: block; }
        .error { background: rgba(255, 107, 107, 0.1); border: 1px solid #ff6b6b; color: #ff9999; }
        @media (max-width: 768px) {
            header { flex-direction: column; align-items: flex-start; }
            .charts { grid-template-columns: 1fr; }
            .container { padding: 20px; }
            .nav { flex-direction: column; width: 100%; }
            .user-section { flex-direction: column; width: 100%; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">PRO PORTFOLIO</div>
        <nav class="nav">
            <a href="dashboard.html" class="active">لوحة التحكم</a>
            <a href="stocks.html">الأسهم</a>
            <a href="analytics.html">التحليلات</a>
            <a href="import-export.html">الاستيراد/التصدير</a>
            <a href="settings.html">الإعدادات</a>
        </nav>
        <div class="user-section">
            <div class="user-info">
                <div class="user-name" id="userName">المستخدم</div>
                <div class="user-email" id="userEmail">email@example.com</div>
            </div>
            <button class="logout-btn" id="logoutBtn">خروج</button>
        </div>
    </header>

    <div class="container">
        <h1 class="title">لوحة التحكم</h1>

        <div id="errorMsg" class="message error"></div>

        <div class="kpis">
            <div class="kpi">
                <div class="kpi-label">إجمالي المشتريات</div>
                <div class="kpi-value" id="totalInvest">0 ج.م</div>
                <div class="kpi-change">من <span id="totalCount">0</span> سهم</div>
            </div>
            <div class="kpi">
                <div class="kpi-label">إجمالي الأرباح</div>
                <div class="kpi-value" id="totalProfit">0 ج.م</div>
                <div class="kpi-change" id="profitPct">+0%</div>
            </div>
            <div class="kpi">
                <div class="kpi-label">القيمة الحالية</div>
                <div class="kpi-value" id="currentVal">0 ج.م</div>
                <div class="kpi-change" id="changePct">+0%</div>
            </div>
        </div>

        <div class="charts">
            <div class="chart-card">
                <div class="chart-title">أداء المحفظة</div>
                <div class="chart-container"><canvas id="performanceChart"></canvas></div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div class="chart-card">
                    <div class="chart-title">توزيع الاستثمار</div>
                    <div class="chart-container"><canvas id="distributionChart"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">أداء الأسهم %</div>
                    <div class="chart-container"><canvas id="performancePerChart"></canvas></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const config = {
            apiKey: "AIzaSyAsL7bSa9ztYVype-TrVN1RG921L668uUQ",
            authDomain: "pro-portfolio-71679.firebaseapp.com",
            databaseURL: "https://pro-portfolio-71679-default-rtdb.firebaseio.com",
            projectId: "pro-portfolio-71679",
            storageBucket: "pro-portfolio-71679.firebasestorage.app",
            messagingSenderId: "238356081205",
            appId: "1:238356081205:web:1a88fb9eff5661a1b75f7c"
        };

        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let stocks = [];
        let charts = {};
        let currentUserId = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            
            try {
                currentUserId = user.uid;
                document.getElementById('userEmail').textContent = user.email;

                const userRef = ref(db, 'users/' + user.uid);
                const snap = await get(userRef);
                if (snap.exists()) {
                    const userData = snap.val();
                    document.getElementById('userName').textContent = userData.name || 'المستخدم';
                }

                loadStocks();
            } catch (error) {
                console.error('Error loading user:', error);
                showError('خطأ في تحميل بيانات المستخدم');
            }
        });

        function loadStocks() {
            try {
                const stocksRef = ref(db, 'stocks/' + currentUserId);
                onValue(stocksRef, (snap) => {
                    stocks = [];
                    if (snap.exists()) {
                        Object.entries(snap.val()).forEach(([key, val]) => {
                            stocks.push({ ...val, id: key });
                        });
                    }
                    render();
                }, (error) => {
                    console.error('Error loading stocks:', error);
                    showError('خطأ في تحميل الأسهم');
                });
            } catch (error) {
                console.error('Error:', error);
                showError('حدث خطأ غير متوقع');
            }
        }

        function render() {
            updateKPIs();
            if (Object.keys(charts).length > 0) updateCharts();
            else initCharts();
        }

        function updateKPIs() {
            let totalInvest = 0, totalCurr = 0;
            stocks.forEach(s => {
                totalInvest += s.purchasePrice * s.quantity;
                totalCurr += s.currentPrice * s.quantity;
            });
            const profit = totalCurr - totalInvest;
            const pct = totalInvest > 0 ? (profit / totalInvest * 100).toFixed(2) : 0;
            
            document.getElementById('totalInvest').textContent = totalInvest.toFixed(2) + ' ج.م';
            document.getElementById('totalProfit').textContent = profit.toFixed(2) + ' ج.م';
            document.getElementById('currentVal').textContent = totalCurr.toFixed(2) + ' ج.م';
            document.getElementById('totalCount').textContent = stocks.length;
            
            const profitEl = document.getElementById('profitPct');
            profitEl.textContent = (profit >= 0 ? '+' : '') + pct + '%';
            profitEl.style.color = profit >= 0 ? '#7dd87d' : '#ff6b6b';
            
            const changeEl = document.getElementById('changePct');
            changeEl.textContent = (profit >= 0 ? '+' : '') + pct + '%';
            changeEl.style.color = profit >= 0 ? '#7dd87d' : '#ff6b6b';
        }

        function initCharts() {
            if (stocks.length === 0) return;

            const ctx1 = document.getElementById('performanceChart').getContext('2d');
            charts.p = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: stocks.map(s => s.name),
                    datasets: [{
                        label: 'الأرباح',
                        data: stocks.map(s => (s.currentPrice - s.purchasePrice) * s.quantity),
                        borderColor: '#d4a574',
                        backgroundColor: 'rgba(212, 165, 116, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(212, 165, 116, 0.1)' }, ticks: { color: '#b0b0b0' } }, x: { grid: { display: false }, ticks: { color: '#b0b0b0' } } } }
            });

            const ctx2 = document.getElementById('distributionChart').getContext('2d');
            charts.d = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: stocks.map(s => s.name),
                    datasets: [{ 
                        data: stocks.map(s => s.purchasePrice * s.quantity), 
                        backgroundColor: ['#d4a574', '#e8c4a0', '#c89968', '#e0b89c', '#d9a17a', '#e5b896', '#c99070', '#e2b08a'],
                        borderColor: '#1a1f2e'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#b0b0b0' } } } }
            });

            const ctx3 = document.getElementById('performancePerChart').getContext('2d');
            charts.pp = new Chart(ctx3, {
                type: 'bar',
                data: {
                    labels: stocks.map(s => s.name),
                    datasets: [{
                        label: '%',
                        data: stocks.map(s => ((s.currentPrice - s.purchasePrice) / s.purchasePrice * 100).toFixed(2)),
                        backgroundColor: stocks.map(s => (s.currentPrice - s.purchasePrice) * s.quantity >= 0 ? '#4caf50' : '#ff6b6b')
                    }]
                },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: 'rgba(212, 165, 116, 0.1)' }, ticks: { color: '#b0b0b0' } }, y: { grid: { display: false }, ticks: { color: '#b0b0b0' } } } }
            });
        }

        function updateCharts() {
            if (stocks.length === 0) return;
            if (charts.p) {
                charts.p.data.labels = stocks.map(s => s.name);
                charts.p.data.datasets[0].data = stocks.map(s => (s.currentPrice - s.purchasePrice) * s.quantity);
                charts.p.update();
            }
            if (charts.d) {
                charts.d.data.labels = stocks.map(s => s.name);
                charts.d.data.datasets[0].data = stocks.map(s => s.purchasePrice * s.quantity);
                charts.d.update();
            }
            if (charts.pp) {
                charts.pp.data.labels = stocks.map(s => s.name);
                charts.pp.data.datasets[0].data = stocks.map(s => ((s.currentPrice - s.purchasePrice) / s.purchasePrice * 100).toFixed(2));
                charts.pp.data.datasets[0].backgroundColor = stocks.map(s => (s.currentPrice - s.purchasePrice) * s.quantity >= 0 ? '#4caf50' : '#ff6b6b');
                charts.pp.update();
            }
        }

        function showError(msg) {
            const msgDiv = document.getElementById('errorMsg');
            msgDiv.textContent = '✗ ' + msg;
            msgDiv.classList.add('show');
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try {
                await signOut(auth);
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Logout error:', error);
            }
        });
    </script>
</body>
</html>
