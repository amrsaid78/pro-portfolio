<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Portfolio - اللوحة الرئيسية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%); color: #ffffff; }
        header { background: rgba(26, 31, 46, 0.9); border-bottom: 1px solid rgba(212, 165, 116, 0.2); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 800; color: #d4a574; }
        .user-info { text-align: right; }
        .user-name { font-weight: 600; }
        .user-email { font-size: 12px; color: #b0b0b0; }
        .logout-btn { padding: 8px 16px; background: rgba(255, 107, 107, 0.2); border: 1px solid #ff6b6b; color: #ff9999; border-radius: 6px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: 600; }
        .logout-btn:hover { background: rgba(255, 107, 107, 0.3); }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px; }
        .title { font-size: 28px; font-weight: 800; margin-bottom: 30px; }
        .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .kpi { background: rgba(26, 31, 46, 0.8); border: 1px solid rgba(212, 165, 116, 0.2); border-radius: 12px; padding: 24px; }
        .kpi-label { color: #b0b0b0; font-size: 12px; margin-bottom: 10px; text-transform: uppercase; }
        .kpi-value { font-size: 28px; font-weight: 800; color: #d4a574; margin-bottom: 5px; }
        .kpi-change { font-size: 13px; color: #7dd87d; }
        .charts { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 40px; }
        .chart-card { background: rgba(26, 31, 46, 0.8); border: 1px solid rgba(212, 165, 116, 0.2); border-radius: 12px; padding: 24px; }
        .chart-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
        .chart-container { position: relative; height: 300px; }
        .table-card { background: rgba(26, 31, 46, 0.8); border: 1px solid rgba(212, 165, 116, 0.2); border-radius: 12px; padding: 24px; }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .add-btn { padding: 10px 20px; background: linear-gradient(135deg, #d4a574 0%, #e8c4a0 100%); border: none; border-radius: 6px; color: #0f1419; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: 700; }
        .add-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(212, 165, 116, 0.3); }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px; text-align: right; font-weight: 700; color: #b0b0b0; font-size: 12px; border-bottom: 1px solid rgba(212, 165, 116, 0.2); text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid rgba(212, 165, 116, 0.1); }
        .action-btn { padding: 6px 12px; background: rgba(212, 165, 116, 0.2); border: 1px solid #d4a574; color: #d4a574; border-radius: 4px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-size: 11px; margin-left: 5px; }
        .action-btn:hover { background: #d4a574; color: #0f1419; }
        .delete-btn { border-color: #ff6b6b; color: #ff6b6b; background: rgba(255, 107, 107, 0.1); }
        .delete-btn:hover { background: #ff6b6b; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); align-items: center; justify-content: center; z-index: 1000; }
        .modal.show { display: flex; }
        .modal-content { background: #1a1f2e; border: 1px solid rgba(212, 165, 116, 0.2); border-radius: 12px; padding: 40px; max-width: 500px; width: 90%; }
        .modal-title { font-size: 24px; font-weight: 800; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; }
        input, select { width: 100%; padding: 10px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(212, 165, 116, 0.2); border-radius: 6px; color: #ffffff; font-family: 'Tajawal', sans-serif; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: #d4a574; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: 700; }
        .modal-btn.primary { background: linear-gradient(135deg, #d4a574 0%, #e8c4a0 100%); color: #0f1419; }
        .modal-btn.secondary { background: rgba(0, 0, 0, 0.3); color: #ffffff; border: 1px solid rgba(212, 165, 116, 0.2); }
        .close { font-size: 28px; cursor: pointer; position: absolute; right: 20px; top: 20px; color: #b0b0b0; border: none; background: none; }
        @media (max-width: 768px) {
            .charts { grid-template-columns: 1fr; }
            header { flex-direction: column; gap: 15px; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">PRO PORTFOLIO</div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <div class="user-info">
                <div class="user-name" id="userName">المستخدم</div>
                <div class="user-email" id="userEmail">email@example.com</div>
            </div>
            <button class="logout-btn" id="logoutBtn">خروج</button>
        </div>
    </header>

    <div class="container">
        <h1 class="title">لوحة التحكم</h1>

        <div class="kpis">
            <div class="kpi">
                <div class="kpi-label">إجمالي المشتريات</div>
                <div class="kpi-value" id="totalInvest">0 ج.م</div>
                <div class="kpi-change">من <span id="totalCount">0</span> سهم</div>
            </div>
            <div class="kpi">
                <div class="kpi-label">إجمالي الأرباح</div>
                <div class="kpi-value" id="totalProfit">0 ج.م</div>
                <div class="kpi-change" id="profitPct">+0%</div>
            </div>
            <div class="kpi">
                <div class="kpi-label">القيمة الحالية</div>
                <div class="kpi-value" id="currentVal">0 ج.م</div>
                <div class="kpi-change" id="changePct">+0%</div>
            </div>
        </div>

        <div class="charts">
            <div class="chart-card">
                <div class="chart-title">أداء المحفظة</div>
                <div class="chart-container"><canvas id="performanceChart"></canvas></div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div class="chart-card">
                    <div class="chart-title">توزيع الاستثمار</div>
                    <div class="chart-container"><canvas id="distributionChart"></canvas></div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">أداء الأسهم</div>
                    <div class="chart-container"><canvas id="performancePerChart"></canvas></div>
                </div>
            </div>
        </div>

        <div class="table-card">
            <div class="table-header">
                <h3>الأسهم</h3>
                <button class="add-btn" id="addBtn">+ إضافة سهم</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>السهم</th>
                        <th>سعر الشراء</th>
                        <th>العدد</th>
                        <th>الإجمالي</th>
                        <th>السعر الحالي</th>
                        <th>القيمة</th>
                        <th>الأرباح</th>
                        <th>النسبة</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="stocksBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="close" onclick="closeModal()">&times;</button>
            <h2 class="modal-title">إضافة سهم</h2>
            <form onsubmit="addStock(event)">
                <div class="form-group">
                    <label>اسم السهم</label>
                    <input type="text" id="stockName" required>
                </div>
                <div class="form-group">
                    <label>سعر الشراء</label>
                    <input type="number" id="purchasePrice" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>العدد</label>
                    <input type="number" id="quantity" min="1" required>
                </div>
                <div class="form-group">
                    <label>السعر الحالي</label>
                    <input type="number" id="currentPrice" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>الفئة</label>
                    <select id="category">
                        <option>قطاع مالي</option>
                        <option>قطاع عقاري</option>
                        <option>قطاع صحي</option>
                        <option>أخرى</option>
                    </select>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="modal-btn secondary" onclick="closeModal()">إلغاء</button>
                    <button type="submit" class="modal-btn primary">إضافة</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getDatabase, ref, get, set, push, remove, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const config = {
            apiKey: "AIzaSyAsL7bSa9ztYVype-TrVN1RG921L668uUQ",
            authDomain: "pro-portfolio-71679.firebaseapp.com",
            databaseURL: "https://pro-portfolio-71679-default-rtdb.firebaseio.com",
            projectId: "pro-portfolio-71679",
            storageBucket: "pro-portfolio-71679.firebasestorage.app",
            messagingSenderId: "238356081205",
            appId: "1:238356081205:web:1a88fb9eff5661a1b75f7c"
        };

        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let stocks = [];
        let charts = {};
        let currentUserId = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUserId = user.uid;
            document.getElementById('userEmail').textContent = user.email;

            const userRef = ref(db, 'users/' + user.uid);
            const snap = await get(userRef);
            if (snap.exists()) {
                document.getElementById('userName').textContent = snap.val().name;
            }

            loadStocks();
        });

        function loadStocks() {
            onValue(ref(db, 'stocks/' + currentUserId), (snap) => {
                stocks = [];
                if (snap.exists()) {
                    Object.entries(snap.val()).forEach(([key, val]) => {
                        stocks.push({ ...val, id: key });
                    });
                }
                render();
            });
        }

        function render() {
            renderTable();
            updateKPIs();
            if (Object.keys(charts).length > 0) updateCharts();
            else initCharts();
        }

        function renderTable() {
            const tbody = document.getElementById('stocksBody');
            tbody.innerHTML = stocks.map((s, i) => {
                const invest = s.purchasePrice * s.quantity;
                const curr = s.currentPrice * s.quantity;
                const profit = curr - invest;
                const pct = (profit / invest * 100).toFixed(2);
                return `<tr>
                    <td>${i + 1}</td>
                    <td>${s.name}</td>
                    <td>${s.purchasePrice}</td>
                    <td>${s.quantity}</td>
                    <td>${invest.toFixed(2)}</td>
                    <td>${s.currentPrice}</td>
                    <td>${curr.toFixed(2)}</td>
                    <td style="color: ${profit >= 0 ? '#7dd87d' : '#ff6b6b'}">${profit.toFixed(2)}</td>
                    <td style="color: ${profit >= 0 ? '#7dd87d' : '#ff6b6b'}">${pct}%</td>
                    <td>
                        <button class="action-btn" onclick="editStock('${s.id}')">تعديل</button>
                        <button class="action-btn delete-btn" onclick="deleteStock('${s.id}')">حذف</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function updateKPIs() {
            let totalInvest = 0, totalCurr = 0;
            stocks.forEach(s => {
                totalInvest += s.purchasePrice * s.quantity;
                totalCurr += s.currentPrice * s.quantity;
            });
            const profit = totalCurr - totalInvest;
            const pct = (profit / totalInvest * 100).toFixed(2);
            document.getElementById('totalInvest').textContent = totalInvest.toFixed(2) + ' ج.م';
            document.getElementById('totalProfit').textContent = profit.toFixed(2) + ' ج.م';
            document.getElementById('currentVal').textContent = totalCurr.toFixed(2) + ' ج.م';
            document.getElementById('totalCount').textContent = stocks.length;
            document.getElementById('profitPct').textContent = (profit >= 0 ? '+' : '') + pct + '%';
            document.getElementById('profitPct').style.color = profit >= 0 ? '#7dd87d' : '#ff6b6b';
            document.getElementById('changePct').textContent = (profit >= 0 ? '+' : '') + pct + '%';
            document.getElementById('changePct').style.color = profit >= 0 ? '#7dd87d' : '#ff6b6b';
        }

        function initCharts() {
            const ctx1 = document.getElementById('performanceChart').getContext('2d');
            charts.p = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: stocks.map(s => s.name),
                    datasets: [{
                        label: 'الأرباح',
                        data: stocks.map(s => (s.currentPrice - s.purchasePrice) * s.quantity),
                        borderColor: '#d4a574',
                        backgroundColor: 'rgba(212, 165, 116, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(212, 165, 116, 0.1)' }, ticks: { color: '#b0b0b0' } }, x: { grid: { display: false }, ticks: { color: '#b0b0b0' } } } }
            });

            const ctx2 = document.getElementById('distributionChart').getContext('2d');
            charts.d = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: stocks.map(s => s.name),
                    datasets: [{ data: stocks.map(s => s.purchasePrice * s.quantity), backgroundColor: ['#d4a574', '#e8c4a0', '#c89968', '#e0b89c'], borderColor: '#1a1f2e' }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#b0b0b0' } } } }
            });

            const ctx3 = document.getElementById('performancePerChart').getContext('2d');
            charts.pp = new Chart(ctx3, {
                type: 'bar',
                data: {
                    labels: stocks.map(s => s.name),
                    datasets: [{
                        label: '%',
                        data: stocks.map(s => ((s.currentPrice - s.purchasePrice) / s.purchasePrice * 100).toFixed(2)),
                        backgroundColor: stocks.map(s => (s.currentPrice - s.purchasePrice) * s.quantity >= 0 ? '#4caf50' : '#ff6b6b')
                    }]
                },
                options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: 'rgba(212, 165, 116, 0.1)' }, ticks: { color: '#b0b0b0' } }, y: { grid: { display: false }, ticks: { color: '#b0b0b0' } } } }
            });
        }

        function updateCharts() {
            charts.p.data.labels = stocks.map(s => s.name);
            charts.p.data.datasets[0].data = stocks.map(s => (s.currentPrice - s.purchasePrice) * s.quantity);
            charts.p.update();
            
            charts.d.data.labels = stocks.map(s => s.name);
            charts.d.data.datasets[0].data = stocks.map(s => s.purchasePrice * s.quantity);
            charts.d.update();
            
            charts.pp.data.labels = stocks.map(s => s.name);
            charts.pp.data.datasets[0].data = stocks.map(s => ((s.currentPrice - s.purchasePrice) / s.purchasePrice * 100).toFixed(2));
            charts.pp.data.datasets[0].backgroundColor = stocks.map(s => (s.currentPrice - s.purchasePrice) * s.quantity >= 0 ? '#4caf50' : '#ff6b6b');
            charts.pp.update();
        }

        window.addStock = async function(e) {
            e.preventDefault();
            const stock = {
                name: document.getElementById('stockName').value.toUpperCase(),
                purchasePrice: parseFloat(document.getElementById('purchasePrice').value),
                quantity: parseInt(document.getElementById('quantity').value),
                currentPrice: parseFloat(document.getElementById('currentPrice').value),
                category: document.getElementById('category').value,
                date: new Date().toISOString()
            };
            await push(ref(db, 'stocks/' + currentUserId), stock);
            document.getElementById('modal').classList.remove('show');
            document.querySelector('form').reset();
        };

        window.deleteStock = async function(id) {
            if (confirm('حذف هذا السهم؟')) {
                await remove(ref(db, 'stocks/' + currentUserId + '/' + id));
            }
        };

        window.editStock = function(id) {
            const stock = stocks.find(s => s.id === id);
            if (stock) {
                document.getElementById('stockName').value = stock.name;
                document.getElementById('purchasePrice').value = stock.purchasePrice;
                document.getElementById('quantity').value = stock.quantity;
                document.getElementById('currentPrice').value = stock.currentPrice;
                document.getElementById('category').value = stock.category;
                document.getElementById('modal').classList.add('show');
            }
        };

        window.closeModal = function() {
            document.getElementById('modal').classList.remove('show');
        };

        document.getElementById('addBtn').addEventListener('click', () => {
            document.querySelector('form').reset();
            document.getElementById('modal').classList.add('show');
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
