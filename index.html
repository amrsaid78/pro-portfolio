<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Portfolio - محفظة استثمارية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { max-width: 400px; width: 100%; background: rgba(26, 31, 46, 0.9); border: 1px solid rgba(212, 165, 116, 0.2); border-radius: 12px; padding: 40px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { font-size: 32px; color: #d4a574; margin-bottom: 5px; }
        .logo p { font-size: 12px; color: #b0b0b0; letter-spacing: 1px; text-transform: uppercase; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; }
        input { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(212, 165, 116, 0.2); border-radius: 6px; color: #ffffff; font-family: 'Tajawal', sans-serif; font-size: 14px; }
        input:focus { outline: none; border-color: #d4a574; background: rgba(0, 0, 0, 0.4); }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid rgba(212, 165, 116, 0.2); }
        .tab-btn { flex: 1; padding: 12px; background: transparent; border: none; color: #b0b0b0; cursor: pointer; font-family: 'Tajawal', sans-serif; font-weight: 600; font-size: 14px; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: #d4a574; border-bottom-color: #d4a574; }
        .form-content { display: none; }
        .form-content.active { display: block; }
        button[type="submit"] { width: 100%; padding: 12px; background: linear-gradient(135deg, #d4a574 0%, #e8c4a0 100%); border: none; border-radius: 6px; color: #0f1419; font-family: 'Tajawal', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; }
        button[type="submit"]:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(212, 165, 116, 0.3); }
        .message { padding: 12px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; display: none; }
        .message.show { display: block; }
        .error { background: rgba(255, 107, 107, 0.1); border: 1px solid #ff6b6b; color: #ff9999; }
        .success { background: rgba(76, 175, 80, 0.1); border: 1px solid #4caf50; color: #7dd87d; }
        .switch-text { text-align: center; margin-top: 20px; font-size: 13px; color: #b0b0b0; }
        .switch-text a { color: #d4a574; cursor: pointer; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>PRO PORTFOLIO</h1>
            <p>محفظة استثمارية</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('login')">دخول</button>
            <button class="tab-btn" onclick="switchTab('register')">تسجيل</button>
        </div>

        <div id="login" class="form-content active">
            <div id="loginMsg" class="message"></div>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit">دخول</button>
            </form>
        </div>

        <div id="register" class="form-content">
            <div id="registerMsg" class="message"></div>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>الاسم</label>
                    <input type="text" id="registerName" required>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="registerEmail" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="registerPassword" required>
                </div>
                <div class="form-group">
                    <label>تأكيد</label>
                    <input type="password" id="registerConfirm" required>
                </div>
                <button type="submit">إنشاء</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const config = {
            apiKey: "AIzaSyAsL7bSa9ztYVype-TrVN1RG921L668uUQ",
            authDomain: "pro-portfolio-71679.firebaseapp.com",
            databaseURL: "https://pro-portfolio-71679-default-rtdb.firebaseio.com",
            projectId: "pro-portfolio-71679",
            storageBucket: "pro-portfolio-71679.firebasestorage.app",
            messagingSenderId: "238356081205",
            appId: "1:238356081205:web:1a88fb9eff5661a1b75f7c"
        };

        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getDatabase(app);

        window.switchTab = function(tab) {
            document.querySelectorAll('.form-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        };

        window.handleLogin = async function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const msg = document.getElementById('loginMsg');
            msg.classList.remove('show');

            try {
                await signInWithEmailAndPassword(auth, email, password);
                msg.innerHTML = '✓ جاري الدخول...';
                msg.classList.add('show', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1000);
            } catch (error) {
                msg.innerHTML = '✗ خطأ: ' + error.message;
                msg.classList.add('show', 'error');
            }
        };

        window.handleRegister = async function(e) {
            e.preventDefault();
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirm').value;
            const msg = document.getElementById('registerMsg');
            msg.classList.remove('show');

            if (password !== confirm) {
                msg.innerHTML = '✗ كلمات المرور غير متطابقة';
                msg.classList.add('show', 'error');
                return;
            }

            try {
                const result = await createUserWithEmailAndPassword(auth, email, password);
                await set(ref(db, 'users/' + result.user.uid), { name, email });
                msg.innerHTML = '✓ تم الإنشاء!';
                msg.classList.add('show', 'success');
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            } catch (error) {
                msg.innerHTML = '✗ ' + error.message;
                msg.classList.add('show', 'error');
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
