<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Portfolio - محفظة استثمارية احترافية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Lora:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #0f1419;
            --secondary-dark: #1a1f2e;
            --accent-gold: #d4a574;
            --accent-light: #f5f1ed;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --success: #4caf50;
            --error: #ff6b6b;
        }

        html, body {
            height: 100%;
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--secondary-dark) 100%);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Background Animation */
        @keyframes floatBg {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(212, 165, 116, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(212, 165, 116, 0.03) 0%, transparent 50%);
            pointer-events: none;
            animation: floatBg 15s ease-in-out infinite;
            z-index: -1;
        }

        .auth-container {
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            background: rgba(26, 31, 46, 0.7);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(212, 165, 116, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-left {
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.1) 0%, rgba(212, 165, 116, 0.03) 100%);
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-left: 1px solid rgba(212, 165, 116, 0.1);
        }

        .logo-section {
            margin-bottom: 40px;
        }

        .logo {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-gold) 0%, #e8c4a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .tagline {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .feature-list {
            text-align: right;
            margin-top: 50px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            animation: slideInLeft 0.8s ease-out forwards;
            opacity: 0;
        }

        .feature-item:nth-child(1) { animation-delay: 0.1s; }
        .feature-item:nth-child(2) { animation-delay: 0.2s; }
        .feature-item:nth-child(3) { animation-delay: 0.3s; }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: rgba(212, 165, 116, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 15px;
            font-size: 20px;
        }

        .feature-text {
            text-align: right;
        }

        .feature-title {
            color: var(--accent-gold);
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .feature-desc {
            color: var(--text-secondary);
            font-size: 12px;
            line-height: 1.4;
        }

        .auth-right {
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-toggle {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            margin-bottom: 40px;
            gap: 0;
        }

        .toggle-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            position: relative;
        }

        .toggle-btn.active {
            color: var(--text-primary);
        }

        .toggle-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-gold) 0%, #e8c4a0 100%);
            border-radius: 1px;
        }

        .form-group {
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(212, 165, 116, 0.2);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            background: rgba(0, 0, 0, 0.4);
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.1);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-gold) 0%, #e8c4a0 100%);
            border: none;
            border-radius: 8px;
            color: var(--primary-dark);
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(212, 165, 116, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .form-switch {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .form-switch a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .form-switch a:hover {
            color: #e8c4a0;
        }

        .error-message {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid var(--error);
            color: #ff9999;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid var(--success);
            color: #7dd87d;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .auth-wrapper {
                grid-template-columns: 1fr;
                max-width: 100%;
            }

            .auth-left {
                display: none;
            }

            .auth-right {
                padding: 40px 24px;
            }

            .logo {
                font-size: 32px;
            }

            .feature-list {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-wrapper">
            <!-- Left Side -->
            <div class="auth-left">
                <div class="logo-section">
                    <div class="logo">PRO PORTFOLIO</div>
                    <div class="tagline">محفظة استثمارية احترافية</div>
                </div>

                <div class="feature-list">
                    <div class="feature-item">
                        <div class="feature-icon">📊</div>
                        <div class="feature-text">
                            <div class="feature-title">تتبع دقيق</div>
                            <div class="feature-desc">راقب أداء محفظتك في الوقت الفعلي</div>
                        </div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">📈</div>
                        <div class="feature-text">
                            <div class="feature-title">تحليلات متقدمة</div>
                            <div class="feature-desc">رسوم بيانية وإحصائيات شاملة</div>
                        </div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">🔒</div>
                        <div class="feature-text">
                            <div class="feature-title">أمان عالي</div>
                            <div class="feature-desc">بياناتك محمية بأعلى معايير الأمان</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side -->
            <div class="auth-right">
                <!-- Toggle -->
                <div class="form-toggle">
                    <button class="toggle-btn active" id="loginToggle">تسجيل الدخول</button>
                    <button class="toggle-btn" id="registerToggle">إنشاء حساب</button>
                </div>

                <!-- Login Form -->
                <form id="loginForm">
                    <div class="error-message" id="loginError"></div>
                    <div class="success-message" id="loginSuccess"></div>

                    <div class="form-group">
                        <label for="loginEmail">البريد الإلكتروني</label>
                        <input type="email" id="loginEmail" placeholder="your@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">كلمة المرور</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="submit-btn">دخول الآن</button>

                    <div class="form-switch">
                        ليس لديك حساب؟ <a onclick="switchToRegister(event)">أنشئ حساباً جديداً</a>
                    </div>
                </form>

                <!-- Register Form -->
                <form id="registerForm" style="display: none;">
                    <div class="error-message" id="registerError"></div>
                    <div class="success-message" id="registerSuccess"></div>

                    <div class="form-group">
                        <label for="registerName">الاسم الكامل</label>
                        <input type="text" id="registerName" placeholder="أحمد محمد" required>
                    </div>

                    <div class="form-group">
                        <label for="registerEmail">البريد الإلكتروني</label>
                        <input type="email" id="registerEmail" placeholder="your@email.com" required>
                    </div>

                    <div class="form-group">
                        <label for="registerPassword">كلمة المرور</label>
                        <input type="password" id="registerPassword" placeholder="••••••••" required>
                    </div>

                    <div class="form-group">
                        <label for="registerPasswordConfirm">تأكيد كلمة المرور</label>
                        <input type="password" id="registerPasswordConfirm" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="submit-btn">إنشاء الحساب</button>

                    <div class="form-switch">
                        هل لديك حساب بالفعل؟ <a onclick="switchToLogin(event)">سجل الدخول</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, setPersistence, browserLocalPersistence, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAsL7bSa9ztYVype-TrVN1RG921L668uUQ",
            authDomain: "pro-portfolio-71679.firebaseapp.com",
            databaseURL: "https://pro-portfolio-71679-default-rtdb.firebaseio.com",
            projectId: "pro-portfolio-71679",
            storageBucket: "pro-portfolio-71679.firebasestorage.app",
            messagingSenderId: "238356081205",
            appId: "1:238356081205:web:1a88fb9eff5661a1b75f7c"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        // Set persistence
        setPersistence(auth, browserLocalPersistence).catch(err => console.log("Persistence error:", err));

        // Make functions global
        window.switchToLogin = switchToLogin;
        window.switchToRegister = switchToRegister;

        function switchToLogin(e) {
            if (e) e.preventDefault();
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginToggle').classList.add('active');
            document.getElementById('registerToggle').classList.remove('active');
        }

        function switchToRegister(e) {
            if (e) e.preventDefault();
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('loginToggle').classList.remove('active');
            document.getElementById('registerToggle').classList.add('active');
        }

        document.getElementById('loginToggle').addEventListener('click', switchToLogin);
        document.getElementById('registerToggle').addEventListener('click', switchToRegister);

        // Handle Login with Firebase
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            const successDiv = document.getElementById('loginSuccess');

            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');

            if (!email || !password) {
                errorDiv.textContent = 'يرجى ملء جميع الحقول';
                errorDiv.classList.add('show');
                return;
            }

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Get user data from database
                const userRef = ref(database, 'users/' + user.uid);
                const snapshot = await get(userRef);

                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    localStorage.setItem('currentUser', JSON.stringify({
                        uid: user.uid,
                        email: user.email,
                        name: userData.name
                    }));

                    successDiv.textContent = 'جاري الدخول...';
                    successDiv.classList.add('show');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                }
            } catch (error) {
                console.error('Login error:', error);
                if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    errorDiv.textContent = 'بريد إلكتروني أو كلمة مرور غير صحيحة';
                } else {
                    errorDiv.textContent = 'حدث خطأ: ' + error.message;
                }
                errorDiv.classList.add('show');
            }
        });

        // Handle Register with Firebase
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const passwordConfirm = document.getElementById('registerPasswordConfirm').value;
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');

            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');

            if (!name || !email || !password || !passwordConfirm) {
                errorDiv.textContent = 'يرجى ملء جميع الحقول';
                errorDiv.classList.add('show');
                return;
            }

            if (password !== passwordConfirm) {
                errorDiv.textContent = 'كلمات المرور غير متطابقة';
                errorDiv.classList.add('show');
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = 'كلمة المرور يجب أن تكون 6 أحرف على الأقل';
                errorDiv.classList.add('show');
                return;
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Save user data to database
                await set(ref(database, 'users/' + user.uid), {
                    name: name,
                    email: email,
                    createdAt: new Date().toISOString()
                });

                successDiv.textContent = 'تم إنشاء الحساب بنجاح! جاري إعادة التوجيه...';
                successDiv.classList.add('show');

                setTimeout(() => {
                    switchToLogin(new Event('click'));
                    document.getElementById('registerForm').reset();
                }, 1500);
            } catch (error) {
                console.error('Register error:', error);
                if (error.code === 'auth/email-already-in-use') {
                    errorDiv.textContent = 'هذا البريد الإلكتروني مسجل بالفعل';
                } else {
                    errorDiv.textContent = 'حدث خطأ: ' + error.message;
                }
                errorDiv.classList.add('show');
            }
        });

        // Check if user is already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // بتأخير صغير عشان نتأكد من البيانات
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 500);
            }
        });
    </script>
</body>
</html>
